<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In | AgentHubTX</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0C3057; --navy-mid: #1A3A5C; --gold: #C8922A;
    --white: #ffffff; --off: #F7F6F3;
    --gray-300: #C8C5BC; --gray-500: #888780; --gray-700: #444441;
    --red: #A32D2D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--off); color: var(--gray-700); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

  .card { background: var(--white); border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 36px 32px; max-width: 380px; width: 100%; }
  .brand { text-align: center; font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .brand span { color: var(--gold); }
  .sub { text-align: center; font-size: 13.5px; color: var(--gray-500); margin-bottom: 26px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 5px; }
  .field input { width: 100%; padding: 11px 13px; border: 1px solid var(--gray-300); border-radius: 7px; font-size: 14.5px; }

  .btn { width: 100%; background: var(--gold); color: var(--navy); border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; }
  .btn:hover { opacity: 0.92; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-text { width: 100%; background: none; border: none; color: var(--navy); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 6px; text-align: center; text-decoration: underline; }

  .msg { font-size: 13.5px; margin-top: 12px; text-align: center; display: none; }
  .msg.show { display: block; }
  .msg.ok { color: #1a7a3c; }
  .msg.err { color: var(--red); }

  .switch-link { text-align: center; font-size: 13.5px; color: var(--gray-500); margin-top: 18px; }
  .switch-link a { color: var(--navy); font-weight: 600; text-decoration: none; }

  .forgot-link { text-align: right; font-size: 12.5px; margin-top: -6px; margin-bottom: 16px; }
  .forgot-link a { color: var(--gray-500); text-decoration: none; }
  .forgot-link a:hover { color: var(--navy); }

  #resetView { display: none; }
</style>
</head>
<body>

<div class="card">
  <div class="brand">Agent<span>HubTX</span></div>

  <!-- Sign in view -->
  <div id="loginView">
    <div class="sub">Sign in to your account</div>

    <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@email.com"></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="Your password"></div>
    <div class="forgot-link"><a href="#" onclick="showResetView(); return false;">Forgot password?</a></div>

    <button class="btn" id="submitBtn" onclick="logIn()">Sign In</button>
    <div class="msg" id="msg"></div>

    <div class="switch-link">Don't have an account? <a href="signup.html">Sign up</a></div>
  </div>

  <!-- Forgot password view -->
  <div id="resetView">
    <div class="sub">Reset your password</div>
    <div class="field"><label>Email</label><input type="email" id="resetEmail" placeholder="you@email.com"></div>

    <button class="btn" id="resetBtn" onclick="sendReset()">Send reset link</button>
    <button class="btn-text" onclick="showLoginView()">Back to sign in</button>
    <div class="msg" id="resetMsg"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://tjdxnmukjraljvjprolk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_ZeQUPnpkiJvLGw-v-Dw9Mw_FilZ1eP5';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showMsg(text) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg show err';
  }

  function showResetView() {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('resetView').style.display = 'block';
  }

  function showLoginView() {
    document.getElementById('resetView').style.display = 'none';
    document.getElementById('loginView').style.display = 'block';
  }

  async function logIn() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');

    if (!email || !password) { showMsg('Please enter your email and password.'); return; }

    btn.disabled = true;
    try {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      window.location.href = 'dashboard.html';
    } catch (err) {
      showMsg(err.message || 'Could not sign in. Please try again.');
    }
    btn.disabled = false;
  }

  async function sendReset() {
    const email = document.getElementById('resetEmail').value.trim();
    const btn = document.getElementById('resetBtn');
    const el = document.getElementById('resetMsg');

    if (!email) {
      el.textContent = 'Please enter your email.';
      el.className = 'msg show err';
      return;
    }

    btn.disabled = true;
    try {
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://agenthubtx.com/reset-password.html'
      });
      if (error) throw error;
      el.textContent = 'Check your email for a reset link.';
      el.className = 'msg show ok';
    } catch (err) {
      el.textContent = err.message || 'Something went wrong. Please try again.';
      el.className = 'msg show err';
    }
    btn.disabled = false;
  }

  // If already logged in, skip straight to the dashboard.
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'dashboard.html';
  })();
</script>
</body>
</html>
