<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listing Description Generator | AgentHubTX</title>
<link href="https://fonts.googleapis.com/css2?family=Cambria:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: hsl(220, 67%, 11%);
  --navy-dark: hsl(220, 67%, 7%);
  --gold: hsl(42, 70%, 55%);
  --gold-light: #F3E3BC;
  --cream: #F7F5EF;
  --white: #FFFFFF;
  --ink: #1C2230;
  --muted: #5F5E5A;
  --border: #E5E3DA;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
body { font-family: var(--font); background: var(--cream); color: var(--ink); min-height: 100vh; }

header { background: var(--navy); padding: 24px; border-bottom: 3px solid var(--gold); }
.header-inner { max-width: 700px; margin: 0 auto; }
.brand { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 0.06em; margin-bottom: 10px; }
.brand span { color: var(--gold); }
.tool-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
.tool-title { font-family: 'Cambria', Georgia, serif; font-size: 26px; font-weight: 700; color: var(--white); margin-bottom: 6px; }
.tool-desc { font-size: 13.5px; color: rgba(255,255,255,0.75); line-height: 1.6; }
.back-link { display: inline-block; margin-top: 12px; font-size: 12px; color: rgba(255,255,255,0.6); text-decoration: none; }
.back-link:hover { color: var(--white); }

.main { max-width: 700px; margin: 0 auto; padding: 28px 16px 60px; }

.form-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 22px; margin-bottom: 16px; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%; padding: 10px 13px; background: var(--cream);
  border: 1px solid var(--border); border-radius: 7px;
  font-size: 13.5px; color: var(--ink); font-family: inherit; transition: border-color 0.15s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: var(--gold); background: var(--white); }
.form-row input::placeholder, .form-row textarea::placeholder { color: #B4B2A9; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

.btn-submit { width: 100%; padding: 13px; background: var(--navy); color: white; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; transition: background 0.15s; margin-top: 4px; }
.btn-submit:hover { background: var(--navy-dark); }
.btn-submit:disabled { background: #B4B2A9; cursor: not-allowed; }
.btn-copy { padding: 7px 16px; background: transparent; color: var(--navy); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.btn-copy:hover { border-color: var(--gold); background: var(--gold-light); }
.btn-clear { padding: 7px 16px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }

.result-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: none; }
.result-card.visible { display: block; }
.result-header { padding: 12px 18px; background: var(--cream); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.result-title { font-size: 12.5px; font-weight: 600; color: var(--ink); }
.result-actions { display: flex; gap: 8px; }
.result-body { padding: 18px; font-size: 13.5px; color: var(--ink); line-height: 1.75; white-space: pre-wrap; }
.result-body.loading { color: var(--muted); font-style: italic; }

footer { background: var(--navy); padding: 1.2rem; text-align: center; font-size: 11.5px; color: rgba(255,255,255,0.4); margin-top: 1.5rem; }

@media (max-width: 600px) {
  .main { padding: 18px 12px 50px; }
  .form-grid-2, .form-grid-3 { grid-template-columns: 1fr; }
  .tool-title { font-size: 21px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">Agent<span>HubTX</span></div>
    <div class="tool-eyebrow">Marketing</div>
    <div class="tool-title">Listing Description Generator</div>
    <div class="tool-desc">Fill in the property details and get three professional listing descriptions — formal, conversational, and SEO-optimized — in seconds.</div>
    <a class="back-link" href="dashboard.html">&larr; Back to AgentHubTX</a>
  </div>
</header>

<div class="main">
  <div class="form-card">
    <div class="form-grid-3">
      <div class="form-row"><label>Bedrooms</label><input type="number" id="l-beds" placeholder="4"></div>
      <div class="form-row"><label>Bathrooms</label><input type="number" id="l-baths" placeholder="3"></div>
      <div class="form-row"><label>Square Feet</label><input type="text" id="l-sqft" placeholder="2,450"></div>
    </div>
    <div class="form-grid-2">
      <div class="form-row"><label>City / Area</label><input type="text" id="l-city" placeholder="Krum, TX"></div>
      <div class="form-row"><label>Price</label><input type="text" id="l-price" placeholder="$385,000"></div>
    </div>
    <div class="form-row"><label>Year built</label><input type="text" id="l-year" placeholder="2018"></div>
    <div class="form-row"><label>Key features (list the best ones)</label><textarea id="l-features" rows="3" placeholder="Pool, 3-car garage, updated kitchen with quartz countertops, open floor plan, large master suite, backing to greenbelt..."></textarea></div>
    <div class="form-row"><label>Neighborhood highlights</label><input type="text" id="l-neighborhood" placeholder="Northwest ISD, quiet cul-de-sac, close to 35W..."></div>
    <button class="btn-submit" onclick="generateListing()">Generate Descriptions &rarr;</button>
  </div>
  <div class="result-card" id="result-listing">
    <div class="result-header">
      <div class="result-title">Your listing descriptions</div>
      <div class="result-actions">
        <button class="btn-copy" onclick="copyResult('result-listing-body')">Copy all</button>
        <button class="btn-clear" onclick="clearResult('result-listing')">Clear</button>
      </div>
    </div>
    <div class="result-body" id="result-listing-body"></div>
  </div>
</div>

<footer>&copy; 2026 AgentHubTX</footer>

<script>
function setLoading(btnEl, resultId, bodyId) {
  btnEl.disabled = true;
  btnEl.textContent = 'Generating...';
  const card = document.getElementById(resultId);
  const body = document.getElementById(bodyId);
  card.classList.add('visible');
  body.classList.add('loading');
  body.textContent = 'Crafting your content...';
}

function setResult(btnEl, originalText, resultId, bodyId, text) {
  btnEl.disabled = false;
  btnEl.textContent = originalText;
  const body = document.getElementById(bodyId);
  body.classList.remove('loading');
  body.textContent = text;
}

function copyResult(bodyId) {
  const text = document.getElementById(bodyId).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll('.btn-copy');
    btns.forEach(b => { const orig = b.textContent; b.textContent = 'Copied!'; setTimeout(() => b.textContent = orig, 2000); });
  });
}

function clearResult(resultId) {
  document.getElementById(resultId).classList.remove('visible');
}

async function callClaude(prompt) {
  const response = await fetch('/.netlify/functions/api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error);
  return data.content;
}

async function generateListing() {
  const beds = document.getElementById('l-beds').value;
  const baths = document.getElementById('l-baths').value;
  const sqft = document.getElementById('l-sqft').value;
  const city = document.getElementById('l-city').value;
  const price = document.getElementById('l-price').value;
  const year = document.getElementById('l-year').value;
  const features = document.getElementById('l-features').value;
  const neighborhood = document.getElementById('l-neighborhood').value;

  if (!beds || !city || !features) { alert('Please fill in bedrooms, city, and key features.'); return; }

  const btn = event.target;
  setLoading(btn, 'result-listing', 'result-listing-body');

  const prompt = `You are a top Texas real estate agent writing listing descriptions. Write THREE versions of a listing description for this property:

Property: ${beds} bed / ${baths} bath, ${sqft} sq ft, built ${year}
Location: ${city}
Price: ${price}
Key features: ${features}
Neighborhood: ${neighborhood}

Write exactly three versions labeled:
VERSION 1 — FORMAL & PROFESSIONAL (150-180 words, sophisticated tone, highlights investment value)
VERSION 2 — WARM & CONVERSATIONAL (150-180 words, inviting tone, paints a lifestyle picture)
VERSION 3 — SEO OPTIMIZED (150-180 words, naturally includes searchable terms like city name, bed/bath count, key features)

Each version should be distinct, compelling, and ready to post. No generic filler phrases like "won't last long" or "priced to sell".`;

  try {
    const result = await callClaude(prompt);
    setResult(btn, 'Generate Descriptions →', 'result-listing', 'result-listing-body', result);
  } catch(err) {
    setResult(btn, 'Generate Descriptions →', 'result-listing', 'result-listing-body', 'Error generating content. Please try again.');
  }
}
</script>
</body>
</html>
