<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | AgentHubTX</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0C3057; --navy-mid: #1A3A5C; --gold: #C8922A;
    --white: #ffffff; --off: #F7F6F3;
    --gray-300: #C8C5BC; --gray-500: #888780; --gray-700: #444441;
    --red: #A32D2D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--off); color: var(--gray-700); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

  .card { background: var(--white); border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 36px 32px; max-width: 380px; width: 100%; }
  .brand { text-align: center; font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .brand span { color: var(--gold); }
  .sub { text-align: center; font-size: 13.5px; color: var(--gray-500); margin-bottom: 26px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 5px; }
  .field input { width: 100%; padding: 11px 13px; border: 1px solid var(--gray-300); border-radius: 7px; font-size: 14.5px; }

  .btn { width: 100%; background: var(--gold); color: var(--navy); border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; }
  .btn:hover { opacity: 0.92; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg { font-size: 13.5px; margin-top: 12px; text-align: center; display: none; }
  .msg.show { display: block; }
  .msg.ok { color: #1a7a3c; }
  .msg.err { color: var(--red); }

  .switch-link { text-align: center; font-size: 13.5px; color: var(--gray-500); margin-top: 18px; }
  .switch-link a { color: var(--navy); font-weight: 600; text-decoration: none; }

  #loadingState { text-align: center; padding: 40px 20px; color: var(--gray-500); }
  #invalidState { display: none; text-align: center; }
  #invalidState p { margin-bottom: 16px; font-size: 13.5px; }
</style>
</head>
<body>

<div class="card">
  <div class="brand">Agent<span>HubTX</span></div>

  <div id="loadingState"><p>Verifying your link...</p></div>

  <div id="invalidState">
    <p>This reset link is invalid or has expired. Reset links can only be used once.</p>
    <a class="switch-link" href="login.html">Back to sign in</a>
  </div>

  <div id="resetForm" style="display:none;">
    <div class="sub">Choose a new password</div>

    <div class="field"><label>New password</label><input type="password" id="newPassword" placeholder="At least 6 characters"></div>
    <div class="field"><label>Confirm password</label><input type="password" id="confirmPassword" placeholder="Re-enter password"></div>

    <button class="btn" id="saveBtn" onclick="saveNewPassword()">Update password</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://tjdxnmukjraljvjprolk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_ZeQUPnpkiJvLGw-v-Dw9Mw_FilZ1eP5';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showMsg(text, isError) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg show ' + (isError ? 'err' : 'ok');
  }

  async function init() {
    // The recovery link lands here with #access_token=...&type=recovery in
    // the URL fragment. The client auto-detects it and starts a (temporary,
    // recovery-scoped) session -- we just wait for it before showing the form.
    const { data: { session } } = await sb.auth.getSession();

    document.getElementById('loadingState').style.display = 'none';

    if (!session) {
      document.getElementById('invalidState').style.display = 'block';
      return;
    }

    if (window.location.hash) {
      history.replaceState(null, '', window.location.pathname);
    }

    document.getElementById('resetForm').style.display = 'block';
  }

  async function saveNewPassword() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('saveBtn');

    if (!newPassword || newPassword.length < 6) {
      showMsg('Password must be at least 6 characters.', true);
      return;
    }
    if (newPassword !== confirmPassword) {
      showMsg('Passwords do not match.', true);
      return;
    }

    btn.disabled = true;
    try {
      const { error } = await sb.auth.updateUser({ password: newPassword });
      if (error) throw error;
      showMsg('Password updated! Redirecting...', false);
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    } catch (err) {
      showMsg(err.message || 'Could not update password. Please try again.', true);
      btn.disabled = false;
    }
  }

  init();
</script>
</body>
</html>
