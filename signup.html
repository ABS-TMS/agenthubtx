<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | AgentHubTX</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0C3057; --navy-mid: #1A3A5C; --gold: #C8922A;
    --white: #ffffff; --off: #F7F6F3;
    --gray-300: #C8C5BC; --gray-500: #888780; --gray-700: #444441;
    --red: #A32D2D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--off); color: var(--gray-700); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

  .card { background: var(--white); border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 36px 32px; max-width: 380px; width: 100%; }
  .brand { text-align: center; font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .brand span { color: var(--gold); }
  .sub { text-align: center; font-size: 13.5px; color: var(--gray-500); margin-bottom: 26px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 5px; }
  .field input { width: 100%; padding: 11px 13px; border: 1px solid var(--gray-300); border-radius: 7px; font-size: 14.5px; }

  .btn { width: 100%; background: var(--gold); color: var(--navy); border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; }
  .btn:hover { opacity: 0.92; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg { font-size: 13.5px; margin-top: 12px; text-align: center; display: none; }
  .msg.show { display: block; }
  .msg.ok { color: #1a7a3c; }
  .msg.err { color: var(--red); }

  .switch-link { text-align: center; font-size: 13.5px; color: var(--gray-500); margin-top: 18px; }
  .switch-link a { color: var(--navy); font-weight: 600; text-decoration: none; }
</style>
</head>
<body>

<div class="card">
  <div class="brand">Agent<span>HubTX</span></div>
  <div class="sub">Create your account</div>

  <div class="field"><label>Full Name</label><input type="text" id="fullName" placeholder="Jane Smith"></div>
  <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@email.com"></div>
  <div class="field"><label>Password</label><input type="password" id="password" placeholder="At least 6 characters"></div>
  <div class="field"><label>Access Code</label><input type="text" id="accessCode" placeholder="Provided by Mike"></div>

  <div class="terms-note">By creating an account, you agree that AgentHubTX's content and tools are for your own individual use, are not to be copied or shared outside your own use, and that access may be revoked at any time.</div>

  <button class="btn" id="submitBtn" onclick="signUp()">Create Account</button>
  <div class="msg" id="msg"></div>

  <div class="switch-link">Already have an account? <a href="login.html">Sign in</a></div>
</div>

<script>
  const SUPABASE_URL = 'https://tjdxnmukjraljvjprolk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_ZeQUPnpkiJvLGw-v-Dw9Mw_FilZ1eP5';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showMsg(text, isError) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg show ' + (isError ? 'err' : 'ok');
  }

  async function signUp() {
    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const accessCode = document.getElementById('accessCode').value.trim();
    const btn = document.getElementById('submitBtn');

    if (!fullName || !email || !password || !accessCode) {
      showMsg('Please fill in all fields.', true);
      return;
    }
    if (accessCode !== '3575') {
      showMsg('That access code is not valid. Contact Mike for the current code.', true);
      return;
    }
    if (password.length < 6) {
      showMsg('Password must be at least 6 characters.', true);
      return;
    }

    btn.disabled = true;
    try {
      const { data, error } = await sb.auth.signUp({
        email, password,
        options: {
          data: { full_name: fullName },
          emailRedirectTo: 'https://agenthubtx.com/setup.html'
        }
      });
      if (error) throw error;

      // Also save the name onto the profile row the DB trigger just created.
      if (data.user) {
        await sb.from('agent_profiles').update({ full_name: fullName }).eq('id', data.user.id);
      }

      if (data.session) {
        // Email confirmation is off -- straight in.
        window.location.href = 'setup.html';
      } else {
        showMsg('Check your email to confirm your account, then sign in.', false);
      }
    } catch (err) {
      showMsg(err.message || 'Something went wrong. Please try again.', true);
    }
    btn.disabled = false;
  }
</script>
</body>
</html>
